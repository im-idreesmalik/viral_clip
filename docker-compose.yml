# Local infrastructure for ViralCut: PostgreSQL + Redis.
# Start with:  docker compose up -d
# The app + worker run on the host (npm run dev / npm run worker).

services:
  postgres:
    image: postgres:16-alpine
    container_name: viralcut-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: viralcut
      POSTGRES_PASSWORD: viralcut
      POSTGRES_DB: viralcut
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U viralcut"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: viralcut-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
